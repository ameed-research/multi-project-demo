spring:
  application:
    name: demo1
  mongodb:
    uri: ${MONGODB_CONNECTION_STRING}
    database: ${MONGODB_DATABASE_NAME}
  cloud:
    azure:
      storage:
        fileshare:
          account-name: ${STORAGE_ACCOUNT_NAME}
          account-key: ${STORAGE_ACCOUNT_KEY}
          endpoint: https://${spring.cloud.azure.storage.fileshare.account-name}.file.core.windows.net
          share-name: carpentry-demo-fileshare
